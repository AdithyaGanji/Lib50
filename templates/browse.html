{% extends "layout.html" %}

{% block title %}
  Browse
{% endblock %}

{% block content %}
  {% if borrow_book_error %}
    <div class="d-flex justify-content-center">
      <div class="alert alert-danger alert-on-homepage alert-dismissible fade show text-center" role="alert">
        Selected book is currently unavailable.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    </div>
  {% endif %}

  <h3 class="text-center">Browse</h3>

  <div class="mt-3 search-result">
    <div class="d-flex justify-content-center search-form">
      <input autofocus autocomplete="off" class="search-input form-control me-2 shadow-none" type="search" name="search_query" placeholder="Search by title, author or genre" aria-label="Search"/>
    </div>

    <div class="mt-3 result-container"></div>
  </div>

  <script>
    const inputElement = document.querySelector('.search-input')
    const resultContainer = document.querySelector('.result-container')

    inputElement.addEventListener('input', async () => {
      // Start afresh
      resultContainer.innerHTML = ''
      
      // Early exit
      const query = inputElement.value
      if (!query)
        return

      const response = await fetch('/fetch?q=' + query)
      const result = await response.json()

      // Empty result
      if (result.length === 0) {
        resultContainer.innerHTML = `
          <p class="text-center">No matches found.</p>
        `
        return
      }
      
      // Pre-HTML for result table
      resultContainer.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Title</th>
              <th class="d-none d-sm-table-cell">Author</th>
              <th class="d-none d-md-table-cell">Genre</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody class="table-body"></tbody>
        </table>
      `
      
      const tableBody = document.querySelector('.table-body')
      result.forEach((book) => {
        tableBody.innerHTML += `
          <tr>
            <td class="align-middle">${book.title}</td>  
            <td class="align-middle d-none d-sm-table-cell">${book.author}</td>  
            <td class="align-middle d-none d-md-table-cell">${book.genre}</td>  
            <td class="align-middle fw-medium ${(!book.user_id) ? "text-success" : "text-danger"}">
              ${(book.user_id) ? "Unavailable" : `
                <div class="d-flex align-items-center">
                  <span>Available</span>
                  <div class="v-divider"></div>
                  <form action="/browse" method="post">
                    <input hidden name="book_id" value=${book.id}>
                    <button class="btn btn-primary borrow-btn">Borrow</button>
                  </form>
                </div>
              `}
            </td>
          </tr>
        `
      })
    })
  </script>
{% endblock %}
