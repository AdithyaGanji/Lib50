<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/style.css">
    <title>
      {% block title %}{% endblock %}
    </title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body">
        <div class="container-fluid">
          <a class="navbar-brand" href="/">Lib50</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            {% block nav_start %}
              <ul class="w-100 navbar-nav">
                <li class="nav-item">
                  <a class="{% if active == 'home' %} active {% endif %} nav-link" aria-current="page" href="/">Home</a>
                </li>
                <li class="nav-item">
                  <a class="{% if active == 'browse' %} active {% endif %} nav-link" href="/browse">Browse</a>
                </li>
                <li class="nav-item">
                  <a class="{% if active == 'return' %} active {% endif %} nav-link" href="/return">Return</a>
                </li>
                <li class="nav-item">
                  <a class="{% if active == 'history' %} active {% endif %} nav-link" href="/history">History</a>
                </li>
              </ul>
            {% endblock %}

            {% block nav_end_link %}
              <div class="nav-item my-2">
                <a class="nav-link logout-link" href="/logout">Logout</a>
              </div>
            {% endblock %}
          </div>
        </div>
      </nav>
    </header>

    <div class="main d-flex flex-column align-items-center">
      {% block main %}
        <div class="content">
          {% block content %}{% endblock %}
        </div>
      {% endblock %}
    </div>
    
    <footer class="w-100 flex-wrap justify-content-between align-items-center py-3 border-top">
      <p class="w-100 col-md-4 mb-0 text-body-secondary text-center">© 2026 Lib50</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
